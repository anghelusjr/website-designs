<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Design Services</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f6f6;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 60px 20px;
    }

    h1 {
      text-align: center;
      font-size: 38px;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 50px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      transition: .3s;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card h3 {
      margin: 0 0 10px;
    }

    .card p {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      padding: 10px 18px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn:hover {
      background: #333;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #777;
      font-size: 14px;
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Website Design Services</h1>
    <p class="subtitle">
      Professional website design for small businesses and startups.
    </p>

    <div class="gallery" id="gallery"></div>

  </div>

  <footer>
    © 2026 WebsiteDesigns.art – Professional Website Design Services
  </footer>
